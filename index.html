<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fuel Cost Calculator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #111827;
      padding: 20px;
      border-radius: 12px;
    }

    h1 {
      margin-bottom: 10px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      background: #020617;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      font-size: 1.2em;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Fuel Cost Calculator</h1>

    <label>MPG (UK)</label>
    <input id="mpg" type="number" value="42">

    <label>Fuel price (pence per litre)</label>
    <input id="price" type="number" value="189.9">

    <label>Distance (miles)</label>
    <input id="distance" type="number" value="100">

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="output"></div>
  </div>

  <script>
    function calculate() {
      const mpg = parseFloat(document.getElementById("mpg").value);
      const price = parseFloat(document.getElementById("price").value);
      const distance = parseFloat(document.getElementById("distance").value);

      const litresPerMile = 4.54609 / mpg;
      const costPerMile = litresPerMile * price; // in pence
      const tripCost = (costPerMile * distance) / 100; // in pounds

      document.getElementById("output").innerHTML =
        "Cost per mile: <b>" + costPerMile.toFixed(2) + "p</b><br>" +
        "Trip cost: <b>£" + tripCost.toFixed(2) + "</b>";
    }

    calculate();
  </script>
</body>
</html>
